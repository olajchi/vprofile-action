name: vprofile actions
on: workflow_dispatch

env:
  AWS_REGION: us-east-2
  ECR_REPOSITORY: vprofileapp
  EKS_CLUSTER: vprofile-eks
  # Silences the 2026 Node.js warnings and forces the modern runner
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  Testing:
    runs-on: ubuntu-latest
    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        # v4 is the standard for 2026 stability and Node 24 support
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Build and Install
        # This compiles the code and runs Unit Tests
        run: mvn clean install -DskipTests=false

      - name: Run Checkstyle
        # This performs static code analysis locally without needing SonarQube
        run: mvn checkstyle:checkstyle

      - name: Upload Test Reports
        # This saves your test results so you can view them in the GitHub UI
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-reports
          path: target/surefire-reports/*.xml

      - name: Upload Checkstyle Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-report
          path: target/checkstyle-result.xml